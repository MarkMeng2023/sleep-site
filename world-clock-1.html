<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: Arial, "Noto Sans TC", sans-serif;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.wrapper {
  width: 900px;
  height: 660px;
  padding: 26px;
  box-sizing: border-box;
  background:
    radial-gradient(circle at top left, rgba(0,255,255,0.10), transparent 35%),
    linear-gradient(135deg, #05070d, #111827, #05070d);
  border-radius: 34px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
  border: 2px solid rgba(255,255,255,0.25);
  box-shadow: 0 0 40px rgba(0,0,0,0.7);
}

.clock {
  position: relative;
  border-radius: 28px;
  background: linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
  color: rgba(220,220,220,0.55);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: all 1.8s ease;
  overflow: hidden;
}

.clock::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(103,232,249,0.28), transparent 70%);
  opacity: 0;
  transition: opacity 2s ease;
}

.city {
  font-size: 38px;
  font-weight: 900;
  letter-spacing: 3px;
  margin-bottom: 18px;
  z-index: 2;
}

.time {
  font-size: 64px;
  font-weight: 900;
  letter-spacing: 4px;
  z-index: 2;
}

.label {
  font-size: 28px;
  margin-top: 14px;
  z-index: 2;
}

.active {
  color: #ffffff;
  background: linear-gradient(145deg, rgba(0,255,255,0.18), rgba(0,120,140,0.12));
  box-shadow:
    0 0 22px rgba(103,232,249,0.55),
    0 0 55px rgba(103,232,249,0.35),
    inset 0 0 32px rgba(103,232,249,0.18);
  animation: breathe 5s ease-in-out infinite;
}

.active::before {
  opacity: 1;
}

.active .city {
  color: #67e8f9;
  text-shadow: 0 0 12px rgba(103,232,249,0.9);
}

.active .time {
  text-shadow:
    0 0 14px rgba(255,255,255,0.7),
    0 0 28px rgba(103,232,249,0.75);
}

@keyframes breathe {
  0% {
    transform: scale(1);
    filter: brightness(1);
  }
  50% {
    transform: scale(1.035);
    filter: brightness(1.28);
  }
  100% {
    transform: scale(1);
    filter: brightness(1);
  }
}
</style>
</head>

<body>
<div class="wrapper">

  <div class="clock" data-zone="Asia/Taipei">
    <div class="city">🇹🇼 TAIPEI</div>
    <div class="time">00:00:00</div>
    <div class="label">台北時間</div>
  </div>

  <div class="clock" data-zone="Asia/Tokyo">
    <div class="city">🇯🇵 TOKYO</div>
    <div class="time">00:00:00</div>
    <div class="label">日本</div>
  </div>

  <div class="clock" data-zone="Asia/Seoul">
    <div class="city">🇰🇷 SEOUL</div>
    <div class="time">00:00:00</div>
    <div class="label">韓國</div>
  </div>

  <div class="clock" data-zone="Europe/London">
    <div class="city">🇬🇧 LONDON</div>
    <div class="time">00:00:00</div>
    <div class="label">英國</div>
  </div>

  <div class="clock" data-zone="America/New_York">
    <div class="city">🇺🇸 NEW YORK</div>
    <div class="time">00:00:00</div>
    <div class="label">美國</div>
  </div>

  <div class="clock" data-zone="Australia/Sydney">
    <div class="city">🇦🇺 SYDNEY</div>
    <div class="time">00:00:00</div>
    <div class="label">澳洲</div>
  </div>

</div>

<script>
const clocks = document.querySelectorAll('.clock');
let activeIndex = 0;

function updateTime() {
  const now = new Date();

  clocks.forEach(clock => {
    const time = new Intl.DateTimeFormat('zh-TW', {
      timeZone: clock.dataset.zone,
      hour12: false,
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    }).format(now);

    clock.querySelector('.time').innerText = time;
  });
}

function updateActive() {
  clocks.forEach(clock => clock.classList.remove('active'));
  clocks[activeIndex].classList.add('active');
  activeIndex = (activeIndex + 1) % clocks.length;
}

updateTime();
updateActive();

setInterval(updateTime, 1000);
setInterval(updateActive, 5000);
</script>
</body>
</html>
